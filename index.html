  <div id="app" class="h-full w-full relative" style="font-family:'Outfit',sans-serif;"><!-- MENU SCREEN -->

    <div id="final-score" class="text-lg text-gray-300 mb-6"></div><button onclick="showMenu()" class="py-3 px-8 rounded-xl text-lg font-bold text-white transition-all hover:scale-105 active:scale-95" style="background:linear-gradient(135deg,#ff2d95,#ff6b35);pointer-events:auto;">Play Again</button>

  <script>
// ====== CONFIG & SDK ======
const defaultConfig = {
  game_title: 'SPLAT RACER',
  background_color: '#0a0015',
  surface_color: '#1a1a2e',
  text_color: '#ffffff',
  primary_action_color: '#ff2d95',
  secondary_action_color: '#00c9ff',
  font_family: 'Bungee',
  font_size: 16
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const t = config.game_title || defaultConfig.game_title;
    const mt = document.getElementById('menu-title');
    if(mt) mt.textContent = t;
    document.title = t;
    const bg = config.background_color || defaultConfig.background_color;
    const menuScreen = document.getElementById('menu-screen');
    if(menuScreen) menuScreen.style.background = `linear-gradient(135deg,${bg} 0%,${config.surface_color||defaultConfig.surface_color} 50%,${bg} 100%)`;
    const pa = config.primary_action_color || defaultConfig.primary_action_color;
    if(mt) mt.style.color = pa;
    const ff = config.font_family || defaultConfig.font_family;
    document.querySelectorAll('[style*="font-family"]').forEach(el => {
      if(el.style.fontFamily.includes('Bungee') || el.style.fontFamily.includes(defaultConfig.font_family)) {
        el.style.fontFamily = `${ff}, cursive`;
      }
    });
    const fs = config.font_size || defaultConfig.font_size;
    document.body.style.fontSize = fs + 'px';
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get:()=>config.background_color||defaultConfig.background_color, set:(v)=>{config.background_color=v;window.elementSdk.setConfig({background_color:v})} },
      { get:()=>config.surface_color||defaultConfig.surface_color, set:(v)=>{config.surface_color=v;window.elementSdk.setConfig({surface_color:v})} },
      { get:()=>config.text_color||defaultConfig.text_color, set:(v)=>{config.text_color=v;window.elementSdk.setConfig({text_color:v})} },
      { get:()=>config.primary_action_color||defaultConfig.primary_action_color, set:(v)=>{config.primary_action_color=v;window.elementSdk.setConfig({primary_action_color:v})} },
      { get:()=>config.secondary_action_color||defaultConfig.secondary_action_color, set:(v)=>{config.secondary_action_color=v;window.elementSdk.setConfig({secondary_action_color:v})} },
    ],
    borderables: [],
    fontEditable: { get:()=>config.font_family||defaultConfig.font_family, set:(v)=>{config.font_family=v;window.elementSdk.setConfig({font_family:v})} },
    fontSizeable: { get:()=>config.font_size||defaultConfig.font_size, set:(v)=>{config.font_size=v;window.elementSdk.setConfig({font_size:v})} },
  }),
  mapToEditPanelValues: (config) => new Map([
    ['game_title', config.game_title || defaultConfig.game_title]
  ])
});

// ====== AUDIO ======
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function playSound(freq,type,dur,vol=0.15){
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sndShoot(){playSound(800,'square',0.06,0.08);}
function sndJump(){playSound(400,'sine',0.15,0.1);setTimeout(()=>playSound(600,'sine',0.1,0.08),80);}
function sndPowerup(){playSound(600,'sine',0.1,0.12);setTimeout(()=>playSound(900,'sine',0.15,0.12),100);}
function sndSplat(){playSound(200,'sawtooth',0.15,0.1);}
function sndTrick(){playSound(1000,'square',0.08,0.08);setTimeout(()=>playSound(1200,'square',0.08,0.08),100);}

// ====== GAME STATE ======
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const PLAYER_COLOR = '#ff2d95';
const ENEMY_COLOR = '#00c9ff';
const GRID = 40; // territory grid cell size in world units
const GAME_TIME = 90; // seconds

let W, H, gameRunning=false, mapIdx=0;
let timeLeft, score, ink, playerTerritory, enemyTerritory;
let player, enemies, powerups, paintSplats, particles, ramps, rails, pickups;
let territory; // 2D grid: 0=none, 1=player, 2=enemy
let terrW, terrH;
let keys={}, mouseX=0, mouseY=0, mouseDown=false;
let trickTimer=0, trickText='', comboCount=0;
let activePowerup=null, powerupTimeLeft=0;
let camX=0, camY=0;

// Map definitions
const MAPS = [
  { name:'Neon City', w:2400, h:2400, bgGrad:['#0a0020','#1a0040'], buildings:true, rampCount:8, railCount:6 },
  { name:'Splat Arena', w:2000, h:2000, bgGrad:['#001020','#002040'], buildings:false, rampCount:12, railCount:8 },
  { name:'Sky Park', w:2800, h:2800, bgGrad:['#002010','#003020'], buildings:true, rampCount:10, railCount:10 },
];

function resize(){
  W=canvas.width=canvas.clientWidth;
  H=canvas.height=canvas.clientHeight;
}
window.addEventListener('resize',resize);
resize();

// ====== INPUT ======
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
canvas.addEventListener('mousedown',e=>{mouseDown=true;ensureAudio();});
canvas.addEventListener('mouseup',e=>{mouseDown=false;});
canvas.addEventListener('touchstart',e=>{mouseDown=true;ensureAudio();e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{mouseDown=false;});
canvas.addEventListener('touchmove',e=>{mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;},{passive:false});

// ====== INIT GAME ======
function startGame(mi){
  mapIdx=mi;
  const map=MAPS[mapIdx];
  document.getElementById('menu-screen').style.display='none';
  document.getElementById('results-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  
  terrW=Math.ceil(map.w/GRID);
  terrH=Math.ceil(map.h/GRID);
  territory=[];
  for(let i=0;i<terrW*terrH;i++) territory[i]=0;
  
  timeLeft=GAME_TIME; score=0; ink=100;
  playerTerritory=0; enemyTerritory=0;
  comboCount=0; trickText=''; trickTimer=0;
  activePowerup=null; powerupTimeLeft=0;
  
  player={x:map.w/2,y:map.h/2,vx:0,vy:0,vz:0,z:0,angle:0,speed:0,jumping:false,grindRail:null,shielded:false,alive:true,respawnTimer:0,spinAngle:0,trickSpin:false};
  
  enemies=[];
  const eCount=3;
  for(let i=0;i<eCount;i++){
    enemies.push({
      x:200+Math.random()*(map.w-400),
      y:200+Math.random()*(map.h-400),
      vx:0,vy:0,vz:0,z:0,angle:Math.random()*Math.PI*2,
      speed:0,jumping:false,shootTimer:0,dirTimer:0,
      targetAngle:Math.random()*Math.PI*2,
      alive:true,respawnTimer:0
    });
  }
  
  // Generate ramps
  ramps=[];
  for(let i=0;i<map.rampCount;i++){
    ramps.push({x:100+Math.random()*(map.w-200),y:100+Math.random()*(map.h-200),w:80,h:40,boost:8});
  }
  
  // Generate rails
  rails=[];
  for(let i=0;i<map.railCount;i++){
    const sx=150+Math.random()*(map.w-300), sy=150+Math.random()*(map.h-300);
    const a=Math.random()*Math.PI*2, len=150+Math.random()*200;
    rails.push({x1:sx,y1:sy,x2:sx+Math.cos(a)*len,y2:sy+Math.sin(a)*len});
  }
  
  // Generate powerup spawn points
  pickups=[];
  spawnPickups();
  
  paintSplats=[];
  particles=[];
  
  gameRunning=true;
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function spawnPickups(){
  const map=MAPS[mapIdx];
  pickups=[];
  const types=['speed','bomb','shield','ink'];
  for(let i=0;i<6;i++){
    pickups.push({
      x:100+Math.random()*(map.w-200),
      y:100+Math.random()*(map.h-200),
      type:types[i%types.length],
      active:true,
      respawn:0,
      bobPhase:Math.random()*Math.PI*2
    });
  }
}

function showMenu(){
  gameRunning=false;
  document.getElementById('menu-screen').style.display='flex';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('results-screen').classList.add('hidden');
}

function endGame(){
  gameRunning=false;
  document.getElementById('results-screen').classList.remove('hidden');
  const pPct=Math.round(playerTerritory/(terrW*terrH)*100);
  const ePct=Math.round(enemyTerritory/(terrW*terrH)*100);
  const won=pPct>ePct;
  document.getElementById('result-text').textContent=won?'🎉 YOU WIN!':'💥 YOU LOSE!';
  document.getElementById('result-text').style.color=won?'#ffea00':'#ff4444';
  document.getElementById('final-score').innerHTML=`Score: ${score} | Your Territory: ${pPct}% | Enemy: ${ePct}%`;
}

// ====== PAINT TERRITORY ======
function paintAt(wx,wy,team,radius){
  const r=radius||2;
  const gx=Math.floor(wx/GRID), gy=Math.floor(wy/GRID);
  let painted=0;
  for(let dx=-r;dx<=r;dx++){
    for(let dy=-r;dy<=r;dy++){
      if(dx*dx+dy*dy>r*r) continue;
      const tx=gx+dx, ty=gy+dy;
      if(tx<0||ty<0||tx>=terrW||ty>=terrH) continue;
      const idx=ty*terrW+tx;
      const prev=territory[idx];
      if(prev!==team){
        if(prev===1) playerTerritory--;
        else if(prev===2) enemyTerritory--;
        territory[idx]=team;
        if(team===1) playerTerritory++;
        else if(team===2) enemyTerritory++;
        painted++;
      }
    }
  }
  return painted;
}

// ====== PROJECTILES ======
let projectiles=[];
function shoot(ox,oy,angle,team){
  const speed=12;
  projectiles.push({x:ox,y:oy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,team,life:40,trail:[]});
}

// ====== PARTICLES ======
function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:20+Math.random()*20,color,size:2+Math.random()*4});
  }
}

// ====== GAME LOOP ======
let lastTime=0;
function gameLoop(now){
  if(!gameRunning) return;
  const dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  const map=MAPS[mapIdx];
  
  // Timer
  timeLeft-=dt;
  if(timeLeft<=0){timeLeft=0;endGame();return;}
  
  // Powerup timer
  if(activePowerup){
    powerupTimeLeft-=dt;
    if(powerupTimeLeft<=0){
      activePowerup=null;
      player.shielded=false;
    }
  }
  
  // Trick display timer
  if(trickTimer>0){trickTimer-=dt;if(trickTimer<=0){document.getElementById('trick-display').classList.add('hidden');}}
  
  // Ink regen
  ink=Math.min(100,ink+dt*8);
  
  // ---- PLAYER ----
  if(player.alive){
    // Movement
    let ax=0,ay=0;
    if(keys['w']||keys['arrowup']) ay=-1;
    if(keys['s']||keys['arrowdown']) ay=1;
    if(keys['a']||keys['arrowleft']) ax=-1;
    if(keys['d']||keys['arrowright']) ax=1;
    
    const accel=activePowerup==='speed'?600:400;
    const friction=0.92;
    
    if(ax||ay){
      const m=Math.sqrt(ax*ax+ay*ay);
      player.vx+=ax/m*accel*dt;
      player.vy+=ay/m*accel*dt;
    }
    player.vx*=friction;
    player.vy*=friction;
    
    const maxSpd=activePowerup==='speed'?10:7;
    const spd=Math.sqrt(player.vx*player.vx+player.vy*player.vy);
    if(spd>maxSpd){player.vx*=maxSpd/spd;player.vy*=maxSpd/spd;}
    player.speed=spd;
    
    if(spd>0.5) player.angle=Math.atan2(player.vy,player.vx);
    
    player.x+=player.vx;
    player.y+=player.vy;
    
    // Jump
    if((keys[' ']||keys['space'])&&player.z===0&&!player.jumping){
      player.vz=10;player.jumping=true;sndJump();
    }
    if(player.z>0||player.vz>0){
      player.vz-=30*dt;
      player.z+=player.vz;
      if(player.z<=0){player.z=0;player.vz=0;player.jumping=false;
        if(player.trickSpin){
          player.trickSpin=false;
          comboCount++;
          const tricks=['SICK SPIN!','RADICAL!','GNARLY!','TUBULAR!','EPIC TRICK!'];
          showTrick(tricks[Math.min(comboCount-1,tricks.length-1)]);
          score+=comboCount*50;
          sndTrick();
        }
      }
    }
    
    // Trick spin while airborne
    if(player.z>0&&spd>3){
      player.trickSpin=true;
      player.spinAngle+=dt*12;
    } else if(player.z===0){
      player.spinAngle=0;
      if(spd<1) comboCount=0;
    }
    
    // Ramp collision
    for(const r of ramps){
      if(player.x>r.x-r.w/2&&player.x<r.x+r.w/2&&player.y>r.y-r.h/2&&player.y<r.y+r.h/2&&player.z===0){
        player.vz=r.boost;player.jumping=true;sndJump();
      }
    }
    
    // Bounds
    player.x=Math.max(20,Math.min(map.w-20,player.x));
    player.y=Math.max(20,Math.min(map.h-20,player.y));
    
    // Paint trail when moving on ground
    if(player.z===0&&spd>1){
      const p=paintAt(player.x,player.y,1,1);
      if(p>0) score+=p;
    }
    
    // Shoot
    if(mouseDown&&ink>=1){
      const aimAngle=Math.atan2(mouseY-H/2,mouseX-W/2);
      shoot(player.x,player.y,aimAngle,1);
      ink-=1.5;
      sndShoot();
      if(activePowerup==='bomb'){
        for(let a=0;a<6;a++) shoot(player.x,player.y,aimAngle+a*Math.PI/3,1);
        ink-=3;
      }
    }
    
    // Pickup collision
    for(const pk of pickups){
      if(!pk.active) continue;
      const dx=player.x-pk.x,dy=player.y-pk.y;
      if(dx*dx+dy*dy<900){
        pk.active=false;pk.respawn=10;
        sndPowerup();
        if(pk.type==='speed'){activePowerup='speed';powerupTimeLeft=6;}
        else if(pk.type==='bomb'){activePowerup='bomb';powerupTimeLeft=5;}
        else if(pk.type==='shield'){activePowerup='shield';powerupTimeLeft=5;player.shielded=true;}
        else if(pk.type==='ink'){ink=100;}
        spawnParticles(pk.x,pk.y,'#ffea00',12);
        score+=25;
      }
    }
  } else {
    player.respawnTimer-=dt;
    if(player.respawnTimer<=0){player.alive=true;player.x=map.w/2;player.y=map.h/2;player.shielded=true;activePowerup='shield';powerupTimeLeft=2;}
  }
  
  // ---- ENEMIES ----
  for(const e of enemies){
    if(!e.alive){
      e.respawnTimer-=dt;
      if(e.respawnTimer<=0){e.alive=true;e.x=200+Math.random()*(map.w-400);e.y=200+Math.random()*(map.h-400);}
      continue;
    }
    
    e.dirTimer-=dt;
    if(e.dirTimer<=0){
      e.dirTimer=1+Math.random()*2;
      // Sometimes aim toward player
      if(Math.random()<0.4&&player.alive){
        e.targetAngle=Math.atan2(player.y-e.y,player.x-e.x);
      } else {
        e.targetAngle+=(-0.5+Math.random())*2;
      }
    }
    
    // Steer toward target
    let da=e.targetAngle-e.angle;
    while(da>Math.PI)da-=Math.PI*2;
    while(da<-Math.PI)da+=Math.PI*2;
    e.angle+=da*3*dt;
    
    const eSpd=4;
    e.vx=Math.cos(e.angle)*eSpd;
    e.vy=Math.sin(e.angle)*eSpd;
    e.x+=e.vx;
    e.y+=e.vy;
    e.x=Math.max(20,Math.min(map.w-20,e.x));
    e.y=Math.max(20,Math.min(map.h-20,e.y));
    
    // Paint trail
    paintAt(e.x,e.y,2,1);
    
    // Shoot at player
    e.shootTimer-=dt;
    if(e.shootTimer<=0&&player.alive){
      const dx=player.x-e.x,dy=player.y-e.y;
      if(dx*dx+dy*dy<400*400){
        shoot(e.x,e.y,Math.atan2(dy,dx),2);
        e.shootTimer=0.8+Math.random()*0.5;
      } else {
        // Shoot forward
        shoot(e.x,e.y,e.angle,2);
        e.shootTimer=1+Math.random();
      }
    }
  }
  
  // ---- PROJECTILES ----
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.life--;
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>6) p.trail.shift();
    
    // Paint on hit ground
    const painted=paintAt(p.x,p.y,p.team,1);
    if(p.team===1) score+=painted;
    
    // Hit detection
    if(p.team===2&&player.alive&&!player.shielded){
      const dx=player.x-p.x,dy=player.y-p.y;
      if(dx*dx+dy*dy<400){
        player.alive=false;player.respawnTimer=2;
        spawnParticles(player.x,player.y,PLAYER_COLOR,20);
        sndSplat();p.life=0;
      }
    }
    if(p.team===1){
      for(const e of enemies){
        if(!e.alive) continue;
        const dx=e.x-p.x,dy=e.y-p.y;
        if(dx*dx+dy*dy<400){
          e.alive=false;e.respawnTimer=3;
          spawnParticles(e.x,e.y,ENEMY_COLOR,20);
          sndSplat();score+=100;p.life=0;break;
        }
      }
    }
    
    if(p.life<=0||p.x<0||p.y<0||p.x>map.w||p.y>map.h) projectiles.splice(i,1);
  }
  
  // ---- PARTICLES ----
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.95;p.vy*=0.95;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
  
  // ---- PICKUPS RESPAWN ----
  for(const pk of pickups){
    if(!pk.active){pk.respawn-=dt;if(pk.respawn<=0)pk.active=true;}
    pk.bobPhase+=dt*3;
  }
  
  // ---- HUD ----
  document.getElementById('hud-score').textContent=score;
  const m=Math.floor(timeLeft/60),s=Math.floor(timeLeft%60);
  document.getElementById('hud-timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('hud-ink').style.width=ink+'%';
  
  const total=terrW*terrH;
  const pPct=Math.round(playerTerritory/total*100);
  const ePct=Math.round(enemyTerritory/total*100);
  document.getElementById('terr-player').style.width=pPct+'%';
  document.getElementById('terr-enemy').style.width=ePct+'%';
  document.getElementById('terr-p-pct').textContent=pPct;
  document.getElementById('terr-e-pct').textContent=ePct;
  
  const pup=document.getElementById('hud-powerup');
  if(activePowerup){
    pup.classList.remove('hidden');
    const icons={speed:'⚡',bomb:'💣',shield:'🛡️',ink:'🎨'};
    document.getElementById('powerup-icon').textContent=icons[activePowerup]||'⭐';
    document.getElementById('powerup-timer').textContent=Math.ceil(powerupTimeLeft)+'s';
  } else {
    pup.classList.add('hidden');
  }
  
  // Camera
  if(player.alive){
    camX+=(player.x-W/2-camX)*0.08;
    camY+=(player.y-H/2-camY)*0.08;
  }
}

function showTrick(text){
  trickText=text;trickTimer=1.5;
  const el=document.getElementById('trick-display');
  el.classList.remove('hidden');
  document.getElementById('trick-text').textContent=text;
}

// ====== RENDER ======
function render(){
  const map=MAPS[mapIdx];
  ctx.clearRect(0,0,W,H);
  
  // Background gradient
  const bgGrad=ctx.createLinearGradient(0,0,W,H);
  bgGrad.addColorStop(0,map.bgGrad[0]);
  bgGrad.addColorStop(1,map.bgGrad[1]);
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,W,H);
  
  ctx.save();
  ctx.translate(-camX,-camY);
  
  // Draw territory grid
  for(let ty=0;ty<terrH;ty++){
    for(let tx=0;tx<terrW;tx++){
      const t=territory[ty*terrW+tx];
      if(t===0) continue;
      const sx=tx*GRID, sy=ty*GRID;
      if(sx+GRID<camX||sx>camX+W||sy+GRID<camY||sy>camY+H) continue;
      ctx.globalAlpha=0.5;
      ctx.fillStyle=t===1?PLAYER_COLOR:ENEMY_COLOR;
      ctx.fillRect(sx,sy,GRID,GRID);
    }
  }
  ctx.globalAlpha=1;
  
  // Grid lines (subtle)
  ctx.strokeStyle='rgba(255,255,255,0.03)';
  ctx.lineWidth=1;
  const startTX=Math.max(0,Math.floor(camX/GRID));
  const endTX=Math.min(terrW,Math.ceil((camX+W)/GRID));
  const startTY=Math.max(0,Math.floor(camY/GRID));
  const endTY=Math.min(terrH,Math.ceil((camY+H)/GRID));
  for(let tx=startTX;tx<=endTX;tx++){
    ctx.beginPath();ctx.moveTo(tx*GRID,startTY*GRID);ctx.lineTo(tx*GRID,endTY*GRID);ctx.stroke();
  }
  for(let ty=startTY;ty<=endTY;ty++){
    ctx.beginPath();ctx.moveTo(startTX*GRID,ty*GRID);ctx.lineTo(endTX*GRID,ty*GRID);ctx.stroke();
  }
  
  // Map border
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=3;
  ctx.strokeRect(0,0,map.w,map.h);
  
  // Ramps
  for(const r of ramps){
    ctx.save();
    ctx.translate(r.x,r.y);
    const rGrad=ctx.createLinearGradient(-r.w/2,0,r.w/2,0);
    rGrad.addColorStop(0,'#ff6b35');rGrad.addColorStop(1,'#ffea00');
    ctx.fillStyle=rGrad;
    ctx.beginPath();
    ctx.moveTo(-r.w/2,r.h/2);ctx.lineTo(r.w/2,r.h/2);ctx.lineTo(r.w/2,-r.h/2);ctx.lineTo(-r.w/4,-r.h/2);ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.font='bold 10px Outfit';ctx.textAlign='center';
    ctx.fillText('▲ RAMP',0,4);
    ctx.restore();
  }
  
  // Rails
  ctx.lineWidth=4;
  for(const r of rails){
    const rGrad=ctx.createLinearGradient(r.x1,r.y1,r.x2,r.y2);
    rGrad.addColorStop(0,'#c0c0c0');rGrad.addColorStop(0.5,'#ffffff');rGrad.addColorStop(1,'#c0c0c0');
    ctx.strokeStyle=rGrad;
    ctx.beginPath();ctx.moveTo(r.x1,r.y1);ctx.lineTo(r.x2,r.y2);ctx.stroke();
    // End posts
    ctx.fillStyle='#888';
    ctx.fillRect(r.x1-3,r.y1-3,6,6);
    ctx.fillRect(r.x2-3,r.y2-3,6,6);
  }
  
  // Pickups
  for(const pk of pickups){
    if(!pk.active) continue;
    const bob=Math.sin(pk.bobPhase)*4;
    ctx.save();ctx.translate(pk.x,pk.y+bob);
    // Glow
    ctx.globalAlpha=0.3;
    ctx.fillStyle=pk.type==='speed'?'#ffea00':pk.type==='bomb'?'#ff4444':pk.type==='shield'?'#4488ff':'#44ff88';
    ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // Icon
    ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const icons={speed:'⚡',bomb:'💣',shield:'🛡️',ink:'🎨'};
    ctx.fillText(icons[pk.type]||'⭐',0,0);
    ctx.restore();
  }
  
  // Projectiles
  for(const p of projectiles){
    ctx.globalAlpha=0.7;
    ctx.fillStyle=p.team===1?PLAYER_COLOR:ENEMY_COLOR;
    // Trail
    for(let t=0;t<p.trail.length;t++){
      const alpha=t/p.trail.length*0.4;
      ctx.globalAlpha=alpha;
      ctx.beginPath();ctx.arc(p.trail[t].x,p.trail[t].y,3,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();
  }
  
  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
  
  // Enemies
  for(const e of enemies){
    if(!e.alive) continue;
    drawRider(e.x,e.y,e.z||0,e.angle,ENEMY_COLOR,false,0);
  }
  
  // Player
  if(player.alive){
    drawRider(player.x,player.y,player.z,player.angle,PLAYER_COLOR,player.shielded,player.spinAngle);
  }
  
  ctx.restore();
  
  // Crosshair
  ctx.save();
  ctx.translate(mouseX,mouseY);
  ctx.strokeStyle=PLAYER_COLOR;ctx.lineWidth=2;ctx.globalAlpha=0.7;
  ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(-6,0);ctx.moveTo(6,0);ctx.lineTo(18,0);ctx.moveTo(0,-18);ctx.lineTo(0,-6);ctx.moveTo(0,6);ctx.lineTo(0,18);ctx.stroke();
  ctx.restore();
}

function drawRider(x,y,z,angle,color,shielded,spin){
  ctx.save();
  ctx.translate(x,y-z*3); // z gives height illusion
  
  // Shadow
  ctx.globalAlpha=0.3;
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,z*2+8,14,6,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  
  if(spin){
    ctx.rotate(spin);
  } else {
    ctx.rotate(angle);
  }
  
  // Hoverboard
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.ellipse(0,4,16,5,0,0,Math.PI*2);
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.stroke();
  
  // Hover glow
  ctx.globalAlpha=0.4;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(0,8,12,3,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  
  // Rider body
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(0,-4,8,0,Math.PI*2);ctx.fill();
  
  // Visor
  ctx.fillStyle=color;
  ctx.fillRect(2,-7,6,5);
  
  // Paint blaster
  ctx.fillStyle='#888';
  ctx.fillRect(8,-2,10,3);
  ctx.fillStyle=color;
  ctx.fillRect(16,-3,4,5);
  
  // Shield effect
  if(shielded){
    ctx.globalAlpha=0.25;
    ctx.strokeStyle='#4488ff';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  
  ctx.restore();
}
